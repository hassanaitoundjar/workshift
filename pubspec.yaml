name: workshift
description: "A new Flutter project."

publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1

  # Calendar
  table_calendar: ^3.0.9
  intl: ^0.20.2

  # UI & Animations
  flutter_slidable: ^3.0.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  flutter_staggered_animations: ^1.1.1
  google_fonts: ^6.1.0

  # Charts (optional for reports)
  fl_chart: ^0.66.0

  # PDF Export
  pdf: ^3.10.7
  printing: ^5.11.1

  # Excel Export
  excel: ^4.0.6

  # File Sharing
  share_plus: ^7.2.1

  # Image Picker for employee photos
  image_picker: ^1.0.7

  # Notifications
  flutter_local_notifications: ^19.0.0

  # UUID for generating unique IDs
  uuid: ^4.3.3

  # Shared Preferences for language storage
  shared_preferences: ^2.2.2

  # App Version & Update Check
  package_info_plus: ^8.0.0
  http: ^1.2.0
  url_launcher: ^6.2.5
  file_picker: ^10.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation for Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

  # App icon generator
  flutter_launcher_icons: ^0.13.1

# The following section is specific to Flutter packages.
flutter:
  # the material Icons class.
  uses-material-design: true
  generate: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/logo/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #\n  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/logo.png"
